# This rule is not used by the project authorino itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to authconfig.authorino.kuadrant.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: authorino
    app.kubernetes.io/managed-by: kustomize
  name: authconfig-viewer-role
rules:
- apiGroups:
  - authconfig.authorino.kuadrant.io
  resources:
  - authconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authconfig.authorino.kuadrant.io
  resources:
  - authconfigs/status
  verbs:
  - get
