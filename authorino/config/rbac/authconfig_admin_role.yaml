# This rule is not used by the project authorino itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over authconfig.authorino.kuadrant.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: authorino
    app.kubernetes.io/managed-by: kustomize
  name: authconfig-admin-role
rules:
- apiGroups:
  - authconfig.authorino.kuadrant.io
  resources:
  - authconfigs
  verbs:
  - '*'
- apiGroups:
  - authconfig.authorino.kuadrant.io
  resources:
  - authconfigs/status
  verbs:
  - get
